<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E0F0D8" stroke="#2E5C2E" stroke-width="3"/>

  <!-- Bow (arc) -->
  <path d="M44 28 Q24 64 44 100" fill="none" stroke="#6B4E23" stroke-width="5" stroke-linecap="round"/>
  <!-- Bowstring -->
  <line x1="44" y1="28" x2="48" y2="64" stroke="#222" stroke-width="1.5"/>
  <line x1="48" y1="64" x2="44" y2="100" stroke="#222" stroke-width="1.5"/>

  <!-- Arrow shaft -->
  <line x1="48" y1="64" x2="100" y2="64" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="100,58 112,64 100,70" fill="#A0A0A0" stroke="#666" stroke-width="1.5"/>
  <!-- Arrow fletching -->
  <polygon points="48,60 56,64 48,68" fill="#8B0000" stroke="#5A0000" stroke-width="1"/>

  <!-- Quiver hint behind -->
  <rect x="80" y="86" width="14" height="22" rx="2" fill="#5C4033" stroke="#3A2820" stroke-width="1.5"/>
  <line x1="84" y1="86" x2="84" y2="78" stroke="#A0A0A0" stroke-width="1.5"/>
  <line x1="88" y1="86" x2="88" y2="76" stroke="#A0A0A0" stroke-width="1.5"/>
  <line x1="92" y1="86" x2="92" y2="78" stroke="#A0A0A0" stroke-width="1.5"/>
</svg>
