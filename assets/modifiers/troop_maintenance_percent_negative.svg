<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#EBF2F8" stroke="#3A5A8A" stroke-width="3"/>

  <!-- Shield -->
  <path d="M64,26 L86,34 L86,60 C86,78 64,94 64,94 C64,94 42,78 42,60 L42,34 Z"
        fill="#4A72A8" stroke="#2C4B8A" stroke-width="2.5"/>
  <!-- Shield inner highlight -->
  <path d="M64,32 L82,39 L82,59 C82,74 64,88 64,88 C64,88 46,74 46,59 L46,39 Z"
        fill="#5A82B8" stroke="none"/>

  <!-- Coin in shield center -->
  <circle cx="64" cy="60" r="15" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  <circle cx="64" cy="60" r="11" fill="none" stroke="#DAA520" stroke-width="1.2"/>
  <!-- Crown symbol on coin -->
  <path d="M56,67 L56,63 L58.5,56 L61.5,62 L64,53 L66.5,62 L69.5,56 L72,63 L72,67 Z"
        fill="#8B6914" stroke="#6B5010" stroke-width="0.8" stroke-linejoin="round"/>
  <rect x="56" y="65" width="16" height="2.5" rx="1" fill="#6B5010"/>

  <!-- Red arrow DOWN (top-right corner) -->
  <g transform="translate(98, 28)">
    <polygon points="0,18 12,0 6,0 6,-12 -6,-12 -6,0 -12,0" fill="#E74C3C" stroke="#A93226" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
