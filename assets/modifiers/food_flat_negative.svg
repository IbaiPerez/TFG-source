<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#F0FFF0" stroke="#2E7D32" stroke-width="3"/>

  <!-- Wheat sheaf (central) -->
  <g transform="translate(58, 72)">
    <!-- Stems -->
    <line x1="0" y1="20" x2="-8" y2="-18" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="0" y2="-22" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="8" y2="-18" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Grain heads -->
    <ellipse cx="-10" cy="-22" rx="5" ry="9" fill="#DAA520" stroke="#B8860B" stroke-width="1.5"/>
    <ellipse cx="0" cy="-26" rx="5" ry="9" fill="#DAA520" stroke="#B8860B" stroke-width="1.5"/>
    <ellipse cx="10" cy="-22" rx="5" ry="9" fill="#DAA520" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Grain detail lines -->
    <line x1="-10" y1="-28" x2="-10" y2="-16" stroke="#B8860B" stroke-width="0.8"/>
    <line x1="0" y1="-32" x2="0" y2="-20" stroke="#B8860B" stroke-width="0.8"/>
    <line x1="10" y1="-28" x2="10" y2="-16" stroke="#B8860B" stroke-width="0.8"/>
    <!-- Tie -->
    <ellipse cx="0" cy="14" rx="8" ry="3" fill="none" stroke="#8B6914" stroke-width="2"/>
  </g>

  <!-- Red arrow DOWN (top-right corner) -->
  <g transform="translate(98, 28)">
    <polygon points="0,18 12,0 6,0 6,-12 -6,-12 -6,0 -12,0" fill="#E74C3C" stroke="#A93226" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
