<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle - purple/card theme -->
  <circle cx="64" cy="64" r="60" fill="#EDE7F6" stroke="#5E35B1" stroke-width="3"/>

  <!-- Single card (left side) -->
  <rect x="24" y="34" width="34" height="50" rx="4" fill="#D1C4E9" stroke="#5E35B1" stroke-width="2" transform="rotate(-5, 41, 59)"/>
  <!-- Card detail - star -->
  <g transform="translate(41, 57) rotate(-5)">
    <polygon points="0,-8 2.5,-2.5 8,-2.5 4,1.5 5.5,8 0,5 -5.5,8 -4,1.5 -8,-2.5 -2.5,-2.5" fill="#7E57C2" stroke="#5E35B1" stroke-width="0.8"/>
  </g>

  <!-- Restock-style curved arrows (right side) -->
  <g transform="translate(82, 68)">
    <!-- Arrow 1: curved from top-left to bottom, arrowhead pointing down -->
    <path d="M -13,-10 Q 12,-10 12,4" fill="none" stroke="#2ECC40" stroke-width="4.5" stroke-linecap="round"/>
    <polygon points="12,8 6,0 18,0" fill="#2ECC40" stroke="#1B7A26" stroke-width="1" stroke-linejoin="round"/>

    <!-- Arrow 2: curved from bottom-right to top, arrowhead pointing up -->
    <path d="M 13,10 Q -12,10 -12,-4" fill="none" stroke="#2ECC40" stroke-width="4.5" stroke-linecap="round"/>
    <polygon points="-12,-8 -18,0 -6,0" fill="#2ECC40" stroke="#1B7A26" stroke-width="1" stroke-linejoin="round"/>
  </g>

  <!-- Green arrow UP (top-right corner) -->
  <g transform="translate(98, 28)">
    <polygon points="0,-18 12,0 6,0 6,12 -6,12 -6,0 -12,0" fill="#2ECC40" stroke="#1B7A26" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
