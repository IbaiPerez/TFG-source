<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#F0FFF0" stroke="#2E7D32" stroke-width="3"/>

  <!-- Wheat sheaf (central, slightly offset for % space) -->
  <g transform="translate(56, 66)">
    <!-- Stems -->
    <line x1="0" y1="18" x2="-7" y2="-16" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="0" y2="-20" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="18" x2="7" y2="-16" stroke="#8B7355" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Grain heads -->
    <ellipse cx="-9" cy="-20" rx="5" ry="8" fill="#DAA520" stroke="#B8860B" stroke-width="1.5"/>
    <ellipse cx="0" cy="-24" rx="5" ry="8" fill="#DAA520" stroke="#B8860B" stroke-width="1.5"/>
    <ellipse cx="9" cy="-20" rx="5" ry="8" fill="#DAA520" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Grain detail lines -->
    <line x1="-9" y1="-26" x2="-9" y2="-14" stroke="#B8860B" stroke-width="0.8"/>
    <line x1="0" y1="-30" x2="0" y2="-18" stroke="#B8860B" stroke-width="0.8"/>
    <line x1="9" y1="-26" x2="9" y2="-14" stroke="#B8860B" stroke-width="0.8"/>
    <!-- Tie -->
    <ellipse cx="0" cy="12" rx="7" ry="3" fill="none" stroke="#8B6914" stroke-width="2"/>
  </g>

  <!-- Percent symbol (bottom-left) -->
  <g transform="translate(28, 102)">
    <circle cx="-4" cy="-10" r="4" fill="#2E7D32" stroke="#1B5E20" stroke-width="1"/>
    <circle cx="8" cy="2" r="4" fill="#2E7D32" stroke="#1B5E20" stroke-width="1"/>
    <line x1="-8" y1="4" x2="12" y2="-14" stroke="#1B5E20" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Red arrow DOWN (top-right corner) -->
  <g transform="translate(98, 28)">
    <polygon points="0,18 12,0 6,0 6,-12 -6,-12 -6,0 -12,0" fill="#E74C3C" stroke="#A93226" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
