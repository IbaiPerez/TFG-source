<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#EDE7F6" stroke="#5E35B1" stroke-width="3"/>

  <!-- Card stack (central) -->
  <!-- Back card -->
  <rect x="38" y="34" width="36" height="52" rx="4" fill="#B39DDB" stroke="#5E35B1" stroke-width="2" transform="rotate(-8, 56, 60)"/>
  <!-- Front card -->
  <rect x="44" y="32" width="36" height="52" rx="4" fill="#EDE7F6" stroke="#5E35B1" stroke-width="2" transform="rotate(5, 62, 58)"/>
  <!-- Card detail - star -->
  <g transform="translate(62, 56) rotate(5)">
    <polygon points="0,-10 3,-3 10,-3 5,2 7,10 0,6 -7,10 -5,2 -10,-3 -3,-3" fill="#7E57C2" stroke="#5E35B1" stroke-width="1"/>
  </g>

  <!-- Red arrow DOWN (top-right corner) -->
  <g transform="translate(98, 28)">
    <polygon points="0,18 12,0 6,0 6,-12 -6,-12 -6,0 -12,0" fill="#E74C3C" stroke="#A93226" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
</svg>
