<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#EAE0D0" stroke="#6B4A2A" stroke-width="3"/>

  <!-- Ground shadow -->
  <ellipse cx="64" cy="106" rx="44" ry="5" fill="#4A2A0A" opacity="0.2"/>

  <!-- Back log (horizontal, showing length) -->
  <rect x="12" y="62" width="104" height="24" rx="8" fill="#8B5A2A" stroke="#5A3010" stroke-width="2"/>
  <!-- Back log grain lines -->
  <line x1="24" y1="66" x2="116" y2="66" stroke="#6B4020" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="70" x2="116" y2="70" stroke="#6B4020" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="80" x2="116" y2="80" stroke="#6B4020" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="84" x2="116" y2="84" stroke="#6B4020" stroke-width="1" opacity="0.3"/>
  <!-- Back log highlight -->
  <rect x="16" y="64" width="50" height="5" rx="4" fill="#C4844A" opacity="0.35"/>
  <!-- Back log end-face (left) -->
  <ellipse cx="18" cy="74" rx="8" ry="12" fill="#7A4A20" stroke="#5A3010" stroke-width="1.5"/>
  <ellipse cx="18" cy="74" rx="5" ry="8" fill="none" stroke="#9A6A40" stroke-width="1" opacity="0.6"/>
  <ellipse cx="18" cy="74" rx="2.5" ry="4" fill="none" stroke="#9A6A40" stroke-width="0.8" opacity="0.5"/>
  <!-- Back log end-face (right) -->
  <ellipse cx="114" cy="74" rx="8" ry="12" fill="#7A4A20" stroke="#5A3010" stroke-width="1.5"/>
  <ellipse cx="114" cy="74" rx="5" ry="8" fill="none" stroke="#9A6A40" stroke-width="1" opacity="0.6"/>
  <ellipse cx="114" cy="74" rx="2.5" ry="4" fill="none" stroke="#9A6A40" stroke-width="0.8" opacity="0.5"/>

  <!-- Front log (horizontal, slightly lower and overlapping) -->
  <rect x="16" y="80" width="96" height="24" rx="8" fill="#9B6A3A" stroke="#5A3010" stroke-width="2"/>
  <!-- Front log grain lines -->
  <line x1="28" y1="84" x2="108" y2="84" stroke="#7A4A20" stroke-width="1" opacity="0.5"/>
  <line x1="28" y1="88" x2="108" y2="88" stroke="#7A4A20" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="96" x2="108" y2="96" stroke="#7A4A20" stroke-width="1" opacity="0.4"/>
  <line x1="28" y1="100" x2="108" y2="100" stroke="#7A4A20" stroke-width="1" opacity="0.3"/>
  <!-- Front log highlight -->
  <rect x="22" y="82" width="44" height="5" rx="4" fill="#C4844A" opacity="0.4"/>
  <!-- Front log end-face (left) -->
  <ellipse cx="22" cy="92" rx="8" ry="12" fill="#8B5A2A" stroke="#5A3010" stroke-width="2"/>
  <ellipse cx="22" cy="92" rx="5" ry="8" fill="none" stroke="#B4804A" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="22" cy="92" rx="2.5" ry="4" fill="none" stroke="#B4804A" stroke-width="0.8" opacity="0.5"/>
  <circle cx="22" cy="92" r="1" fill="#6B4020" opacity="0.6"/>
  <!-- Front log end-face (right) -->
  <ellipse cx="108" cy="92" rx="8" ry="12" fill="#8B5A2A" stroke="#5A3010" stroke-width="2"/>
  <ellipse cx="108" cy="92" rx="5" ry="8" fill="none" stroke="#B4804A" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="108" cy="92" rx="2.5" ry="4" fill="none" stroke="#B4804A" stroke-width="0.8" opacity="0.5"/>
  <circle cx="108" cy="92" r="1" fill="#6B4020" opacity="0.6"/>

  <!-- Axe leaning against logs -->
  <!-- Handle -->
  <rect x="72" y="28" width="6" height="56" rx="3" fill="#8B6914" stroke="#6B4C0A" stroke-width="1.5" transform="rotate(15,75,56)"/>
  <!-- Axe head -->
  <path d="M62,30 Q56,22 64,16 Q74,14 76,24 Q80,18 86,20 Q90,30 82,36 Q76,38 70,34 Z"
        fill="#808090" stroke="#4A4A5A" stroke-width="1.5"/>
  <!-- Axe edge highlight -->
  <path d="M62,30 Q58,22 64,16" fill="none" stroke="#B0B0C0" stroke-width="1.5" stroke-linecap="round"/>
</svg>
