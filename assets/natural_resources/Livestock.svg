<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F0E6D0" stroke="#6B4020" stroke-width="3"/>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="104" rx="44" ry="5" fill="#6B4020" opacity="0.2"/>

  <!-- Tail -->
  <path d="M22,72 Q10,66 12,56 Q14,50 20,52" fill="none" stroke="#5A3010" stroke-width="3" stroke-linecap="round"/>
  <path d="M20,52 Q18,46 22,44" fill="none" stroke="#5A3010" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cow body -->
  <path d="M22,72 Q22,52 40,46 Q58,42 78,46 Q96,50 100,64 Q102,78 94,88 Q82,96 58,96 Q34,96 24,86 Q20,82 22,72 Z"
        fill="#EDE0C8" stroke="#6B4020" stroke-width="2"/>

  <!-- Brown spot 1 (back/top) -->
  <ellipse cx="46" cy="56" rx="14" ry="9" fill="#8B5020" opacity="0.7"/>
  <!-- Brown spot 2 (middle) -->
  <ellipse cx="74" cy="68" rx="10" ry="13" fill="#7A4018" opacity="0.65"/>

  <!-- Udder -->
  <path d="M48,94 Q56,104 68,100 Q76,98 76,92" fill="#DDAAA0" stroke="#6B4020" stroke-width="1.2"/>

  <!-- Legs (4) -->
  <rect x="34" y="90" width="10" height="16" rx="3" fill="#C8B090" stroke="#6B4020" stroke-width="1.5"/>
  <rect x="50" y="92" width="10" height="14" rx="3" fill="#C8B090" stroke="#6B4020" stroke-width="1.5"/>
  <rect x="68" y="90" width="10" height="16" rx="3" fill="#C8B090" stroke="#6B4020" stroke-width="1.5"/>
  <rect x="82" y="88" width="10" height="14" rx="3" fill="#C8B090" stroke="#6B4020" stroke-width="1.5"/>

  <!-- Hooves -->
  <rect x="34" y="104" width="10" height="4" rx="2" fill="#5A3010"/>
  <rect x="50" y="104" width="10" height="4" rx="2" fill="#5A3010"/>
  <rect x="68" y="104" width="10" height="4" rx="2" fill="#5A3010"/>
  <rect x="82" y="100" width="10" height="4" rx="2" fill="#5A3010"/>

  <!-- Neck -->
  <path d="M96,60 Q108,56 112,48" fill="none" stroke="#C8B090" stroke-width="12" stroke-linecap="round"/>
  <path d="M96,60 Q108,56 112,48" fill="none" stroke="#6B4020" stroke-width="2"/>

  <!-- Head -->
  <ellipse cx="112" cy="44" rx="14" ry="12" fill="#EDE0C8" stroke="#6B4020" stroke-width="2"/>
  <!-- Snout -->
  <ellipse cx="120" cy="48" rx="7" ry="5" fill="#D4B8A0" stroke="#6B4020" stroke-width="1.5"/>
  <circle cx="118" cy="48" r="1.5" fill="#5A3010"/>
  <circle cx="122" cy="48" r="1.5" fill="#5A3010"/>

  <!-- Eye -->
  <circle cx="108" cy="40" r="3.5" fill="white" stroke="#6B4020" stroke-width="1"/>
  <circle cx="108.5" cy="40" r="2" fill="#1A0A00"/>
  <circle cx="109" cy="39" r="0.8" fill="white"/>

  <!-- Ear -->
  <path d="M100,36 Q96,26 104,24 Q110,26 108,36" fill="#D4B8A0" stroke="#6B4020" stroke-width="1.5"/>

  <!-- Horn -->
  <path d="M104,32 Q100,22 106,18" fill="none" stroke="#8B6040" stroke-width="2.5" stroke-linecap="round"/>
</svg>
