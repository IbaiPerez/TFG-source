<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E4EDE0" stroke="#3A5C2A" stroke-width="3"/>

  <!-- Neck -->
  <path d="M54,90 Q50,76 52,66" fill="none" stroke="#8B5A2A" stroke-width="14" stroke-linecap="round"/>
  <path d="M74,90 Q78,76 76,66" fill="none" stroke="#8B5A2A" stroke-width="14" stroke-linecap="round"/>
  <path d="M54,90 Q64,94 74,90 Q78,76 76,66 Q72,60 64,60 Q56,60 52,66 Q50,76 54,90 Z"
        fill="#9B6A3A" stroke="#6B4020" stroke-width="1.5"/>

  <!-- Head -->
  <ellipse cx="64" cy="56" rx="20" ry="18" fill="#9B6A3A" stroke="#6B4020" stroke-width="2"/>

  <!-- Snout/muzzle -->
  <ellipse cx="64" cy="68" rx="10" ry="7" fill="#7A4A20" stroke="#6B4020" stroke-width="1.5"/>
  <circle cx="60" cy="69" r="2" fill="#4A2A10"/>
  <circle cx="68" cy="69" r="2" fill="#4A2A10"/>

  <!-- Eyes -->
  <circle cx="54" cy="52" r="4.5" fill="white" stroke="#6B4020" stroke-width="1"/>
  <circle cx="54.5" cy="52" r="2.8" fill="#1A0A00"/>
  <circle cx="55.5" cy="51" r="1" fill="white"/>
  <circle cx="74" cy="52" r="4.5" fill="white" stroke="#6B4020" stroke-width="1"/>
  <circle cx="74.5" cy="52" r="2.8" fill="#1A0A00"/>
  <circle cx="75.5" cy="51" r="1" fill="white"/>

  <!-- Ears -->
  <path d="M46,50 Q38,36 44,28 Q50,24 54,34 Q52,42 48,48 Z"
        fill="#9B6A3A" stroke="#6B4020" stroke-width="1.5"/>
  <path d="M47,48 Q40,36 44,30 Q50,28 52,36 Z" fill="#C8907A" opacity="0.6"/>
  <path d="M82,50 Q90,36 84,28 Q78,24 74,34 Q76,42 80,48 Z"
        fill="#9B6A3A" stroke="#6B4020" stroke-width="1.5"/>
  <path d="M81,48 Q88,36 84,30 Q78,28 76,36 Z" fill="#C8907A" opacity="0.6"/>

  <!-- LEFT antler -->
  <path d="M50,40 Q44,28 38,20" fill="none" stroke="#6B4020" stroke-width="5" stroke-linecap="round"/>
  <!-- Left antler branch 1 (forward) -->
  <path d="M44,28 Q36,22 30,26" fill="none" stroke="#6B4020" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left antler branch 2 (up) -->
  <path d="M40,22 Q34,14 30,10" fill="none" stroke="#6B4020" stroke-width="3" stroke-linecap="round"/>
  <!-- Left antler branch 3 (tip) -->
  <path d="M38,20 Q32,16 28,18" fill="none" stroke="#6B4020" stroke-width="2.5" stroke-linecap="round"/>

  <!-- RIGHT antler -->
  <path d="M78,40 Q84,28 90,20" fill="none" stroke="#6B4020" stroke-width="5" stroke-linecap="round"/>
  <!-- Right antler branch 1 (forward) -->
  <path d="M84,28 Q92,22 98,26" fill="none" stroke="#6B4020" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right antler branch 2 (up) -->
  <path d="M88,22 Q94,14 98,10" fill="none" stroke="#6B4020" stroke-width="3" stroke-linecap="round"/>
  <!-- Right antler branch 3 (tip) -->
  <path d="M90,20 Q96,16 100,18" fill="none" stroke="#6B4020" stroke-width="2.5" stroke-linecap="round"/>
</svg>
