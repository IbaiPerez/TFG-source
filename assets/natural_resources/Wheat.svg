<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F8F0C8" stroke="#A08020" stroke-width="3"/>

  <!-- Ground/base shadow -->
  <ellipse cx="64" cy="104" rx="32" ry="5" fill="#8B6914" opacity="0.2"/>

  <!-- Bundle ribbon at base -->
  <rect x="52" y="90" width="24" height="6" rx="2" fill="#8B6914" stroke="#6B5010" stroke-width="1.2"/>
  <path d="M54,93 Q64,91 74,93" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.6"/>

  <!-- LEFT stalk -->
  <line x1="48" y1="92" x2="36" y2="28" stroke="#6B8E23" stroke-width="3" stroke-linecap="round"/>
  <!-- Left top grain head -->
  <ellipse cx="34" cy="22" rx="5" ry="9" fill="#DAA520" stroke="#A08020" stroke-width="1.5"/>
  <!-- Left spikelets -->
  <ellipse cx="27" cy="32" rx="4" ry="7" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(-22,27,32)"/>
  <ellipse cx="41" cy="32" rx="4" ry="7" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(22,41,32)"/>
  <ellipse cx="26" cy="44" rx="3.5" ry="6" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(-28,26,44)"/>
  <ellipse cx="42" cy="44" rx="3.5" ry="6" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(28,42,44)"/>

  <!-- CENTER stalk (tallest) -->
  <line x1="64" y1="92" x2="64" y2="18" stroke="#6B8E23" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Center top grain head -->
  <ellipse cx="64" cy="12" rx="6" ry="10" fill="#FFD700" stroke="#A08020" stroke-width="1.5"/>
  <!-- Center spikelets -->
  <ellipse cx="55" cy="24" rx="5" ry="8" fill="#FFD700" stroke="#A08020" stroke-width="1.5" transform="rotate(-18,55,24)"/>
  <ellipse cx="73" cy="24" rx="5" ry="8" fill="#FFD700" stroke="#A08020" stroke-width="1.5" transform="rotate(18,73,24)"/>
  <ellipse cx="54" cy="38" rx="4.5" ry="7" fill="#FFD700" stroke="#A08020" stroke-width="1.5" transform="rotate(-22,54,38)"/>
  <ellipse cx="74" cy="38" rx="4.5" ry="7" fill="#FFD700" stroke="#A08020" stroke-width="1.5" transform="rotate(22,74,38)"/>
  <ellipse cx="54" cy="52" rx="4" ry="6" fill="#FFD700" stroke="#A08020" stroke-width="1.5" transform="rotate(-26,54,52)"/>
  <ellipse cx="74" cy="52" rx="4" ry="6" fill="#FFD700" stroke="#A08020" stroke-width="1.5" transform="rotate(26,74,52)"/>

  <!-- RIGHT stalk -->
  <line x1="80" y1="92" x2="92" y2="30" stroke="#6B8E23" stroke-width="3" stroke-linecap="round"/>
  <!-- Right top grain head -->
  <ellipse cx="94" cy="24" rx="5" ry="9" fill="#DAA520" stroke="#A08020" stroke-width="1.5"/>
  <!-- Right spikelets -->
  <ellipse cx="87" cy="34" rx="4" ry="7" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(-22,87,34)"/>
  <ellipse cx="101" cy="34" rx="4" ry="7" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(22,101,34)"/>
  <ellipse cx="86" cy="46" rx="3.5" ry="6" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(-28,86,46)"/>
  <ellipse cx="102" cy="46" rx="3.5" ry="6" fill="#DAA520" stroke="#A08020" stroke-width="1.5" transform="rotate(28,102,46)"/>
