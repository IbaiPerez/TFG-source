<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F0E8E0" stroke="#8A6040" stroke-width="3"/>

  <!-- Ziggurat tiers (bottom to top) -->
  <!-- Tier 1 - base -->
  <rect x="16" y="88" width="96" height="14" rx="2" fill="#C4A878" stroke="#8A6040" stroke-width="1.5"/>
  <line x1="20" y1="95" x2="108" y2="95" stroke="#A08060" stroke-width="1" opacity="0.5"/>
  <!-- Tier 2 -->
  <rect x="26" y="74" width="76" height="14" rx="2" fill="#D0B888" stroke="#8A6040" stroke-width="1.5"/>
  <line x1="30" y1="81" x2="98" y2="81" stroke="#A08060" stroke-width="1" opacity="0.5"/>
  <!-- Tier 3 -->
  <rect x="36" y="60" width="56" height="14" rx="2" fill="#D8C498" stroke="#8A6040" stroke-width="1.5"/>
  <line x1="40" y1="67" x2="88" y2="67" stroke="#A08060" stroke-width="1" opacity="0.5"/>
  <!-- Tier 4 -->
  <rect x="46" y="46" width="36" height="14" rx="2" fill="#E0CCA0" stroke="#8A6040" stroke-width="1.5"/>
  <line x1="50" y1="53" x2="78" y2="53" stroke="#A08060" stroke-width="1" opacity="0.5"/>
  <!-- Temple on top -->
  <rect x="54" y="34" width="20" height="12" rx="1" fill="#E8D8B0" stroke="#8A6040" stroke-width="1.5"/>
  <rect x="60" y="38" width="8" height="8" rx="1" fill="#6B4C1A" stroke="#4A3408" stroke-width="1"/>
  <!-- Staircase (center) -->
  <line x1="64" y1="46" x2="64" y2="102" stroke="#8A6040" stroke-width="2.5" opacity="0.4"/>
  <line x1="60" y1="46" x2="60" y2="102" stroke="#8A6040" stroke-width="0.8" opacity="0.3"/>
  <line x1="68" y1="46" x2="68" y2="102" stroke="#8A6040" stroke-width="0.8" opacity="0.3"/>
  <!-- Divine symbol -->
  <circle cx="64" cy="26" r="5" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <g stroke="#FFD700" stroke-width="1.2" stroke-linecap="round">
    <line x1="64" y1="18" x2="64" y2="16"/>
    <line x1="57" y1="22" x2="55" y2="20"/>
    <line x1="71" y1="22" x2="73" y2="20"/>
    <line x1="57" y1="30" x2="55" y2="32"/>
    <line x1="71" y1="30" x2="73" y2="32"/>
  </g>

</svg>
