  <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round">
    <line x1="64" y1="25" x2="64" y2="23"/>
    <line x1="64" y1="43" x2="64" y2="45"/>
    <line x1="55" y1="34" x2="53" y2="34"/>
    <line x1="73" y1="34" x2="75" y2="34"/>
  </g>

</svg>