<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#D6D0C8" stroke="#6B6055" stroke-width="3"/>

  <!-- Mountain peaks background -->
  <polygon points="20,90 40,55 60,90" fill="#8A9BAE" opacity="0.5"/>
  <polygon points="50,90 75,45 100,90" fill="#7A8B9E" opacity="0.5"/>

  <!-- Main fortress wall base -->
  <rect x="28" y="72" width="72" height="22" fill="#8A7F70" stroke="#5C5245" stroke-width="1.5"/>

  <!-- Left tower -->
  <rect x="22" y="52" width="22" height="42" fill="#9A8E7D" stroke="#5C5245" stroke-width="1.5"/>
  <!-- Left tower crenellations -->
  <rect x="22" y="46" width="5" height="8" fill="#9A8E7D" stroke="#5C5245" stroke-width="1"/>
  <rect x="30" y="46" width="5" height="8" fill="#9A8E7D" stroke="#5C5245" stroke-width="1"/>
  <rect x="38" y="46" width="5" height="8" fill="#9A8E7D" stroke="#5C5245" stroke-width="1"/>

  <!-- Right tower -->
  <rect x="84" y="52" width="22" height="42" fill="#9A8E7D" stroke="#5C5245" stroke-width="1.5"/>
  <!-- Right tower crenellations -->
  <rect x="84" y="46" width="5" height="8" fill="#9A8E7D" stroke="#5C5245" stroke-width="1"/>
  <rect x="92" y="46" width="5" height="8" fill="#9A8E7D" stroke="#5C5245" stroke-width="1"/>
  <rect x="100" y="46" width="5" height="8" fill="#9A8E7D" stroke="#5C5245" stroke-width="1"/>

  <!-- Center wall crenellations -->
  <rect x="44" y="66" width="6" height="8" fill="#8A7F70" stroke="#5C5245" stroke-width="1"/>
  <rect x="54" y="66" width="6" height="8" fill="#8A7F70" stroke="#5C5245" stroke-width="1"/>
  <rect x="64" y="66" width="6" height="8" fill="#8A7F70" stroke="#5C5245" stroke-width="1"/>
  <rect x="74" y="66" width="6" height="8" fill="#8A7F70" stroke="#5C5245" stroke-width="1"/>

  <!-- Gate arch -->
  <path d="M54,94 L54,80 Q64,70 74,80 L74,94 Z" fill="#3A2E25"/>

  <!-- Tower windows -->
  <rect x="29" y="60" width="8" height="10" rx="3" fill="#3A2E25"/>
  <rect x="91" y="60" width="8" height="10" rx="3" fill="#3A2E25"/>

  <!-- Shield emblem on wall -->
  <path d="M64,76 L58,79 L58,84 Q64,88 64,88 Q70,88 70,84 L70,79 Z" fill="#C8A84B" stroke="#8B6914" stroke-width="1"/>

  <!-- Ground -->
  <line x1="16" y1="94" x2="112" y2="94" stroke="#5C5245" stroke-width="2"/>
</svg>
