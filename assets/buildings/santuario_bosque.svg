<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#2D4A2D" stroke="#1A3A1A" stroke-width="3"/>

  <!-- Large tree trunk -->
  <rect x="56" y="48" width="16" height="44" rx="3" fill="#5C3D1E" stroke="#3E2A12" stroke-width="1.5"/>
  <!-- Roots -->
  <path d="M56,88 Q48,92 40,90" fill="none" stroke="#5C3D1E" stroke-width="3" stroke-linecap="round"/>
  <path d="M72,88 Q80,92 88,90" fill="none" stroke="#5C3D1E" stroke-width="3" stroke-linecap="round"/>

  <!-- Tree canopy -->
  <ellipse cx="64" cy="38" rx="28" ry="22" fill="#3A6B3A" stroke="#2D5A2D" stroke-width="1.5"/>
  <ellipse cx="52" cy="42" rx="16" ry="14" fill="#4A7E4A" opacity="0.7"/>
  <ellipse cx="76" cy="42" rx="16" ry="14" fill="#4A7E4A" opacity="0.7"/>

  <!-- Spirit glow in tree -->
  <circle cx="64" cy="36" r="8" fill="#90EE90" opacity="0.3"/>
  <circle cx="64" cy="36" r="4" fill="#ADFFAD" opacity="0.5"/>

  <!-- Shrine stones at base -->
  <rect x="44" y="86" width="10" height="8" rx="2" fill="#7A7A6A" stroke="#5A5A4A" stroke-width="1"/>
  <rect x="74" y="86" width="10" height="8" rx="2" fill="#7A7A6A" stroke="#5A5A4A" stroke-width="1"/>
  <!-- Altar stone -->
  <rect x="54" y="82" width="20" height="4" rx="1" fill="#8A8A7A" stroke="#5A5A4A" stroke-width="1"/>

  <!-- Spirit sparkles -->
  <circle cx="48" cy="30" r="1.5" fill="#ADFFAD" opacity="0.6"/>
  <circle cx="80" cy="28" r="1.5" fill="#ADFFAD" opacity="0.5"/>
  <circle cx="56" cy="22" r="1" fill="#ADFFAD" opacity="0.4"/>
  <circle cx="74" cy="24" r="1" fill="#ADFFAD" opacity="0.5"/>

  <!-- Ground -->
  <line x1="24" y1="94" x2="104" y2="94" stroke="#1A3A1A" stroke-width="2"/>
</svg>
