<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F0E8D0" stroke="#8B6914" stroke-width="3"/>

  <!-- Building -->
  <rect x="22" y="48" width="84" height="52" rx="2" fill="#C4A04A" stroke="#8B6914" stroke-width="2"/>
  <!-- Roof -->
  <polygon points="18,50 64,22 110,50" fill="#8B6914" stroke="#6B4C0A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Large door -->
  <rect x="38" y="64" width="52" height="36" rx="2" fill="#6B4C0A" stroke="#4A3408" stroke-width="1.5"/>
  <!-- Door slats -->
  <line x1="52" y1="64" x2="52" y2="100" stroke="#5A3C0A" stroke-width="1" opacity="0.5"/>
  <line x1="64" y1="64" x2="64" y2="100" stroke="#5A3C0A" stroke-width="1" opacity="0.5"/>
  <line x1="76" y1="64" x2="76" y2="100" stroke="#5A3C0A" stroke-width="1" opacity="0.5"/>
  <!-- Cross beams on door -->
  <line x1="38" y1="78" x2="90" y2="78" stroke="#4A3408" stroke-width="2"/>
  <!-- Crate peeking out -->
  <rect x="42" y="82" width="16" height="14" rx="1" fill="#DAB860" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="42" y1="89" x2="58" y2="89" stroke="#8B6914" stroke-width="1"/>
  <line x1="50" y1="82" x2="50" y2="96" stroke="#8B6914" stroke-width="1"/>
  <!-- Second crate -->
  <rect x="62" y="85" width="14" height="12" rx="1" fill="#C4A04A" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="62" y1="91" x2="76" y2="91" stroke="#8B6914" stroke-width="1"/>

</svg>