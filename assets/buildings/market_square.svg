<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#FFF8DC" stroke="#B8860B" stroke-width="3"/>

  <!-- Central pillar -->
  <line x1="64" y1="28" x2="64" y2="85" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
  <!-- Base -->
  <ellipse cx="64" cy="88" rx="18" ry="6" fill="#8B6914" stroke="#6B4C0A" stroke-width="2"/>
  <!-- Balance beam -->
  <line x1="28" y1="38" x2="100" y2="38" stroke="#B8860B" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Top pivot -->
  <polygon points="58,28 64,22 70,28" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Left pan -->
  <line x1="34" y1="38" x2="28" y2="58" stroke="#B8860B" stroke-width="1.5"/>
  <line x1="34" y1="38" x2="42" y2="58" stroke="#B8860B" stroke-width="1.5"/>
  <path d="M24,58 Q35,66 46,58" fill="#DAC060" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Right pan -->
  <line x1="94" y1="38" x2="86" y2="58" stroke="#B8860B" stroke-width="1.5"/>
  <line x1="94" y1="38" x2="102" y2="58" stroke="#B8860B" stroke-width="1.5"/>
  <path d="M82,58 Q94,66 106,58" fill="#DAC060" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Coins in left pan -->
  <circle cx="35" cy="56" r="4" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <!-- Goods in right pan -->
  <rect x="90" y="52" width="8" height="6" rx="1" fill="#C4864A" stroke="#8B5A2A" stroke-width="1"/>

</svg>