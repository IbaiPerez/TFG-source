<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E0EEF5" stroke="#2C5F8A" stroke-width="3"/>

  <!-- Market stall roof -->
  <polygon points="18,45 64,28 110,45" fill="#B85C3A" stroke="#8B3A1A" stroke-width="2" stroke-linejoin="round"/>
  <!-- Stall table -->
  <rect x="24" y="45" width="80" height="8" rx="2" fill="#8B6914" stroke="#6B4C0A" stroke-width="2"/>
  <!-- Stall legs -->
  <line x1="30" y1="53" x2="30" y2="100" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="53" x2="98" y2="100" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Fish on display -->
  <ellipse cx="50" cy="70" rx="16" ry="9" fill="#4A90C4" stroke="#2C5F8A" stroke-width="1.5"/>
  <polygon points="64,68 74,60 74,78 64,72" fill="#4A90C4" stroke="#2C5F8A" stroke-width="1.5"/>
  <circle cx="40" cy="68" r="2" fill="white"/>
  <!-- Gold coins -->
  <circle cx="82" cy="65" r="7" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="88" cy="74" r="6" fill="#FFC125" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="78" cy="76" r="5" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>

</svg>