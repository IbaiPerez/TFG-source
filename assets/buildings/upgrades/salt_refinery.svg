<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E8E4E0" stroke="#6E5C3E" stroke-width="3"/>

  <!-- Building/furnace -->
  <rect x="30" y="50" width="68" height="48" rx="3" fill="#A09080" stroke="#6E5C3E" stroke-width="2"/>
  <!-- Chimney -->
  <rect x="78" y="28" width="12" height="24" rx="2" fill="#8A7A68" stroke="#6E5C3E" stroke-width="1.5"/>
  <!-- Smoke -->
  <g fill="none" stroke="#999" stroke-width="2" opacity="0.5">
    <path d="M84,28 Q80,20 84,12"/>
    <path d="M88,26 Q92,18 88,10"/>
  </g>
  <!-- Window/furnace opening -->
  <rect x="38" y="60" width="18" height="14" rx="2" fill="#FF6B00" opacity="0.5" stroke="#6E5C3E" stroke-width="1.5"/>
  <!-- Salt containers/barrels -->
  <rect x="64" y="72" width="14" height="18" rx="3" fill="#E8E0D0" stroke="#A09080" stroke-width="1.5"/>
  <rect x="80" y="76" width="12" height="14" rx="3" fill="#F0ECE4" stroke="#A09080" stroke-width="1.5"/>
  <!-- Refined salt crystals on top -->
  <g fill="white" stroke="#C0C0D0" stroke-width="1">
    <polygon points="68,72 71,64 74,72" />
    <polygon points="84,76 86,70 88,76" />
  </g>
  <!-- Roof line -->
  <line x1="28" y1="50" x2="100" y2="50" stroke="#6E5C3E" stroke-width="3"/>

</svg>