<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F0F4F8" stroke="#5A9AB5" stroke-width="3"/>

  <!-- Furnace glow background -->
  <ellipse cx="64" cy="80" rx="30" ry="12" fill="#FF6B00" opacity="0.12"/>
  <!-- Glass bottle (left) -->
  <g transform="translate(28,30)">
    <rect x="6" y="0" width="8" height="15" rx="3" fill="#A0D8F0" stroke="#5A9AB5" stroke-width="1.5" opacity="0.8"/>
    <path d="M2,15 Q0,30 0,50 Q0,60 10,62 Q20,60 20,50 Q20,30 18,15 Z" fill="#A0D8F0" stroke="#5A9AB5" stroke-width="1.5" opacity="0.8"/>
    <!-- Glass shine -->
    <line x1="6" y1="20" x2="6" y2="50" stroke="white" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Glass goblet (center) -->
  <g transform="translate(52,28)">
    <path d="M4,0 Q0,14 2,24 L8,28 L16,28 L22,24 Q24,14 20,0 Z" fill="#B0E0F0" stroke="#5A9AB5" stroke-width="1.5" opacity="0.8"/>
    <rect x="10" y="28" width="4" height="16" rx="1" fill="#5A9AB5" stroke="#3A7A95" stroke-width="1"/>
    <ellipse cx="12" cy="46" rx="8" ry="3" fill="#5A9AB5" stroke="#3A7A95" stroke-width="1"/>
    <line x1="8" y1="4" x2="8" y2="20" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Glass vase (right) -->
  <g transform="translate(78,35)">
    <rect x="5" y="0" width="10" height="10" rx="3" fill="#90D0E8" stroke="#5A9AB5" stroke-width="1.5" opacity="0.8"/>
    <path d="M0,10 Q-2,28 8,38 Q12,40 18,38 Q22,28 20,10 Z" fill="#90D0E8" stroke="#5A9AB5" stroke-width="1.5" opacity="0.8"/>
    <line x1="6" y1="14" x2="6" y2="32" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Flame beneath -->
  <g transform="translate(54,82)">
    <ellipse cx="10" cy="8" rx="12" ry="8" fill="#FF6B00" opacity="0.4"/>
    <polygon points="4,10 10,0 16,10" fill="#FF8C00" opacity="0.6"/>
  </g>

</svg>