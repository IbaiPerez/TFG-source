<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E0EEF5" stroke="#2C5F8A" stroke-width="3"/>

  <!-- Water -->
  <path d="M10,85 Q30,78 50,85 Q70,92 90,85 Q110,78 120,85" fill="none" stroke="#4A90C4" stroke-width="2.5" opacity="0.4"/>
  <rect x="5" y="90" width="118" height="20" rx="0" fill="#4A90C4" opacity="0.15"/>
  <!-- Boat hull -->
  <path d="M25,82 Q30,95 64,98 Q98,95 103,82 Z" fill="#8B6914" stroke="#6B4C0A" stroke-width="2"/>
  <!-- Mast -->
  <line x1="64" y1="82" x2="64" y2="28" stroke="#6B4C0A" stroke-width="3" stroke-linecap="round"/>
  <!-- Sail -->
  <path d="M64,32 L90,55 L64,70 Z" fill="#F0E8D0" stroke="#C4A04A" stroke-width="1.5"/>
  <!-- Fish in boat -->
  <ellipse cx="48" cy="82" rx="8" ry="5" fill="#4A90C4" stroke="#2C5F8A" stroke-width="1"/>
  <ellipse cx="75" cy="84" rx="7" ry="4" fill="#5AA0D4" stroke="#2C5F8A" stroke-width="1"/>
  <!-- Flag -->
  <polygon points="64,28 78,32 64,38" fill="#B85C3A" stroke="#8B3A1A" stroke-width="1"/>

</svg>