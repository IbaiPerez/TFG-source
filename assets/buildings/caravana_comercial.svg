<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F5DEB3" stroke="#C4964A" stroke-width="3"/>

  <!-- Desert dunes background -->
  <path d="M20,86 Q40,78 60,84 Q80,90 100,82 L108,94 L20,94 Z" fill="#E8C876" opacity="0.5"/>

  <!-- Camel body -->
  <ellipse cx="64" cy="62" rx="22" ry="12" fill="#A0764A" stroke="#7A5A30" stroke-width="1.5"/>
  <!-- Camel hump -->
  <ellipse cx="60" cy="54" rx="8" ry="6" fill="#A0764A" stroke="#7A5A30" stroke-width="1"/>
  <!-- Camel neck -->
  <path d="M80,58 Q86,44 84,34" fill="none" stroke="#A0764A" stroke-width="6" stroke-linecap="round"/>
  <!-- Camel head -->
  <ellipse cx="86" cy="32" rx="8" ry="5" fill="#A0764A" stroke="#7A5A30" stroke-width="1"/>
  <!-- Camel eye -->
  <circle cx="89" cy="31" r="1.5" fill="#3E2A12"/>
  <!-- Camel legs -->
  <line x1="50" y1="72" x2="48" y2="88" stroke="#7A5A30" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="72" x2="56" y2="88" stroke="#7A5A30" stroke-width="3" stroke-linecap="round"/>
  <line x1="70" y1="72" x2="72" y2="88" stroke="#7A5A30" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="72" x2="80" y2="88" stroke="#7A5A30" stroke-width="3" stroke-linecap="round"/>

  <!-- Trade goods on camel -->
  <rect x="46" y="46" width="12" height="10" rx="2" fill="#C4864A" stroke="#8B5A2A" stroke-width="1"/>
  <rect x="62" y="44" width="12" height="10" rx="2" fill="#B87333" stroke="#8B5A2A" stroke-width="1"/>
  <!-- Gold coins symbol -->
  <circle cx="52" cy="48" r="3" fill="#FFD700" stroke="#DAA520" stroke-width="0.8"/>
  <text x="50.5" y="50" font-size="4" fill="#8B6914" font-weight="bold">$</text>

  <!-- Ground line -->
  <line x1="24" y1="90" x2="104" y2="90" stroke="#C4964A" stroke-width="2"/>
</svg>
