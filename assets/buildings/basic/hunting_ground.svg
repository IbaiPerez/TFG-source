<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E8DCC8" stroke="#6B4C1A" stroke-width="3"/>

  <!-- Bow -->
  <path d="M40,25 Q20,64 40,103" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
  <!-- Bow string -->
  <line x1="40" y1="25" x2="40" y2="103" stroke="#D2B48C" stroke-width="1.5"/>
  <!-- Arrow -->
  <line x1="40" y1="64" x2="100" y2="64" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="100,64 88,56 88,72" fill="#808080" stroke="#555" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Arrow feathers -->
  <path d="M45,64 L50,57 L55,64" fill="#B85C3A" stroke="#8B3A1A" stroke-width="1" stroke-linejoin="round"/>
  <path d="M45,64 L50,71 L55,64" fill="#B85C3A" stroke="#8B3A1A" stroke-width="1" stroke-linejoin="round"/>
  <!-- Deer tracks -->
  <g opacity="0.4">
    <ellipse cx="74" cy="88" rx="3" ry="5" fill="#8B6914" transform="rotate(-10,74,88)"/>
    <ellipse cx="80" cy="86" rx="3" ry="5" fill="#8B6914" transform="rotate(10,80,86)"/>
  </g>

</svg>