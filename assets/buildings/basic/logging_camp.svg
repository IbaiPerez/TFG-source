<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F0E8D0" stroke="#6B4C0A" stroke-width="3"/>

  <!-- Tree stump -->
  <rect x="40" y="65" width="48" height="35" rx="4" fill="#8B6914" stroke="#6B4C0A" stroke-width="2"/>
  <!-- Stump top (ellipse) -->
  <ellipse cx="64" cy="65" rx="24" ry="8" fill="#C4A04A" stroke="#6B4C0A" stroke-width="2"/>
  <!-- Tree rings -->
  <ellipse cx="64" cy="65" rx="16" ry="5" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <ellipse cx="64" cy="65" rx="8" ry="3" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <!-- Axe handle -->
  <line x1="78" y1="30" x2="56" y2="60" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
  <!-- Axe blade -->
  <path d="M78,24 Q92,28 88,42 L78,34 Z" fill="#808080" stroke="#555" stroke-width="2" stroke-linejoin="round"/>
  <!-- Wood chips -->
  <rect x="30" y="92" width="14" height="8" rx="2" fill="#C4A04A" stroke="#8B6914" stroke-width="1.5" transform="rotate(-15,37,96)"/>
  <rect x="80" y="88" width="12" height="7" rx="2" fill="#C4A04A" stroke="#8B6914" stroke-width="1.5" transform="rotate(10,86,91)"/>

</svg>