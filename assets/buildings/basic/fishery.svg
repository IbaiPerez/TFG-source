<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E0EEF5" stroke="#2C5F8A" stroke-width="3"/>

  <!-- Water waves -->
  <path d="M20,90 Q35,82 50,90 Q65,98 80,90 Q95,82 110,90" fill="none" stroke="#4A90C4" stroke-width="2.5" opacity="0.5"/>
  <path d="M15,100 Q30,92 45,100 Q60,108 75,100 Q90,92 105,100" fill="none" stroke="#4A90C4" stroke-width="2" opacity="0.35"/>
  <!-- Fish body -->
  <g transform="translate(64,55)">
    <ellipse cx="0" cy="0" rx="28" ry="16" fill="#4A90C4" stroke="#2C5F8A" stroke-width="2"/>
    <!-- Tail -->
    <polygon points="26,-2 40,-14 40,14 26,2" fill="#4A90C4" stroke="#2C5F8A" stroke-width="2" stroke-linejoin="round"/>
    <!-- Eye -->
    <circle cx="-14" cy="-3" r="4" fill="white" stroke="#2C5F8A" stroke-width="1.5"/>
    <circle cx="-14" cy="-3" r="2" fill="#2C5F8A"/>
    <!-- Fin -->
    <path d="M-5,-14 L0,-24 L8,-14" fill="#3A7DB4" stroke="#2C5F8A" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Gill line -->
    <path d="M-8,-8 Q-10,0 -8,8" fill="none" stroke="#2C5F8A" stroke-width="1.5"/>
  </g>

</svg>