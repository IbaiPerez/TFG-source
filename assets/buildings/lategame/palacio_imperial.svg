  <rect x="102" y="44" width="8" height="10" rx="4" fill="#E74C3C" stroke="#8B0000" stroke-width="1"/>
  <!-- Imperial star -->
  <polygon points="64,50 66,54 70,54 67,57 68,61 64,58 60,61 61,57 58,54 62,54" fill="#FFD700" stroke="#B8860B" stroke-width="0.5"/>
