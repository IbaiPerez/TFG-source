  <ellipse cx="64" cy="48" rx="24" ry="16" fill="#F1948A" stroke="#8B0000" stroke-width="2"/>
  <ellipse cx="64" cy="48" rx="16" ry="10" fill="#FADBD8" stroke="#8B0000" stroke-width="1"/>
  <!-- Crown spire -->
  <rect x="60" y="28" width="8" height="8" rx="1" fill="#F1948A" stroke="#8B0000" stroke-width="1"/>
  <polygon points="64,16 58,28 70,28" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="64" cy="16" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <!-- Side towers -->
  <rect x="14" y="34" width="16" height="56" rx="2" fill="#F5B7B1" stroke="#8B0000" stroke-width="1.5"/>
