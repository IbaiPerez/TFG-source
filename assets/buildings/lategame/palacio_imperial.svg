  <circle cx="22" cy="24" r="3" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <rect x="98" y="34" width="16" height="56" rx="2" fill="#F5B7B1" stroke="#8B0000" stroke-width="1.5"/>
  <polygon points="106,24 96,34 116,34" fill="#E74C3C" stroke="#8B0000" stroke-width="1.5"/>
