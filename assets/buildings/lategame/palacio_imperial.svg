  <rect x="28" y="56" width="10" height="14" rx="5" fill="#E74C3C" stroke="#8B0000" stroke-width="1"/>
  <rect x="90" y="56" width="10" height="14" rx="5" fill="#E74C3C" stroke="#8B0000" stroke-width="1"/>
