<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#F0E6FF" stroke="#6A0DAD" stroke-width="3"/>

  <!-- Base platform -->
  <rect x="20" y="94" width="88" height="8" rx="2" fill="#8B7D9B" stroke="#4A2068" stroke-width="1.5"/>
  <!-- Main building body -->
  <rect x="30" y="52" width="68" height="44" rx="2" fill="#E6D5F5" stroke="#6A0DAD" stroke-width="1.5"/>
  <!-- Central tower -->
  <rect x="50" y="20" width="28" height="34" rx="1" fill="#D4B8E8" stroke="#6A0DAD" stroke-width="1.5"/>
  <!-- Spire -->
  <polygon points="64,4 54,20 74,20" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Cross on top -->
  <line x1="64" y1="4" x2="64" y2="-2" stroke="#FFD700" stroke-width="2.5"/>
  <line x1="60" y1="1" x2="68" y2="1" stroke="#FFD700" stroke-width="2.5"/>
  <!-- Side towers -->
  <rect x="24" y="38" width="14" height="16" rx="1" fill="#D4B8E8" stroke="#6A0DAD" stroke-width="1.5"/>
  <polygon points="31,30 22,38 40,38" fill="#9B59B6" stroke="#6A0DAD" stroke-width="1.5"/>
  <rect x="90" y="38" width="14" height="16" rx="1" fill="#D4B8E8" stroke="#6A0DAD" stroke-width="1.5"/>
  <polygon points="97,30 88,38 106,38" fill="#9B59B6" stroke="#6A0DAD" stroke-width="1.5"/>
  <!-- Rose window -->
  <circle cx="64" cy="40" r="7" fill="#FFD700" stroke="#B8860B" stroke-width="1.5"/>
  <circle cx="64" cy="40" r="4" fill="#FFF8DC" stroke="#B8860B" stroke-width="1"/>
  <!-- Door -->
  <rect x="54" y="70" width="20" height="24" rx="10" fill="#4A2068" stroke="#2E0854" stroke-width="1.5"/>
  <!-- Side windows -->
  <rect x="34" y="60" width="8" height="14" rx="4" fill="#9B59B6" stroke="#6A0DAD" stroke-width="1"/>
  <rect x="86" y="60" width="8" height="14" rx="4" fill="#9B59B6" stroke="#6A0DAD" stroke-width="1"/>
  <!-- Glow effect -->
  <circle cx="64" cy="40" r="12" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.5"/>
</svg>
