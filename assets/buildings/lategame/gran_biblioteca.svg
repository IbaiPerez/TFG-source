<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E8F0FE" stroke="#1A5276" stroke-width="3"/>

  <!-- Base -->
  <rect x="18" y="92" width="92" height="8" rx="2" fill="#5D6D7E" stroke="#2C3E50" stroke-width="1.5"/>
  <!-- Main building -->
  <rect x="24" y="40" width="80" height="54" rx="2" fill="#D6E9F8" stroke="#1A5276" stroke-width="1.5"/>
  <!-- Dome -->
  <ellipse cx="64" cy="40" rx="40" ry="20" fill="#AED6F1" stroke="#1A5276" stroke-width="2"/>
  <ellipse cx="64" cy="40" rx="30" ry="14" fill="#D6E9F8" stroke="#1A5276" stroke-width="1"/>
  <!-- Dome lantern -->
  <rect x="58" y="18" width="12" height="8" rx="1" fill="#AED6F1" stroke="#1A5276" stroke-width="1.5"/>
  <ellipse cx="64" cy="18" rx="8" ry="4" fill="#85C1E9" stroke="#1A5276" stroke-width="1.5"/>
  <!-- Glowing orb on top -->
  <circle cx="64" cy="14" r="4" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
  <!-- Columns -->
  <rect x="30" y="56" width="6" height="38" rx="1" fill="#EAF2F8" stroke="#1A5276" stroke-width="1"/>
  <rect x="46" y="56" width="6" height="38" rx="1" fill="#EAF2F8" stroke="#1A5276" stroke-width="1"/>
  <rect x="76" y="56" width="6" height="38" rx="1" fill="#EAF2F8" stroke="#1A5276" stroke-width="1"/>
  <rect x="92" y="56" width="6" height="38" rx="1" fill="#EAF2F8" stroke="#1A5276" stroke-width="1"/>
  <!-- Grand door -->
  <rect x="52" y="64" width="24" height="28" rx="12" fill="#1A5276" stroke="#0E3A5C" stroke-width="1.5"/>
  <!-- Book symbol in dome -->
  <rect x="58" y="32" width="12" height="9" rx="1" fill="#F9E79F" stroke="#B8860B" stroke-width="1"/>
  <line x1="64" y1="32" x2="64" y2="41" stroke="#B8860B" stroke-width="1"/>
  <!-- Side windows -->
  <rect x="32" y="48" width="8" height="6" rx="1" fill="#85C1E9" stroke="#1A5276" stroke-width="1"/>
  <rect x="88" y="48" width="8" height="6" rx="1" fill="#85C1E9" stroke="#1A5276" stroke-width="1"/>
</svg>
