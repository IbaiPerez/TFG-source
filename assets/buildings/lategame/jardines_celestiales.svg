  <circle cx="40" cy="59" r="4" fill="#388E3C" opacity="0.8"/>
  <circle cx="48" cy="58" r="3" fill="#4CAF50" opacity="0.7"/>
  <circle cx="80" cy="59" r="4" fill="#388E3C" opacity="0.8"/>
  <circle cx="88" cy="58" r="3" fill="#4CAF50" opacity="0.7"/>

