<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#F5E6C8" stroke="#8B6914" stroke-width="3"/>

  <!-- Bottom card (offset) -->
  <rect x="30" y="28" width="58" height="78" rx="6" fill="#D4C4A0" stroke="#8B6914" stroke-width="2"/>

  <!-- Middle card (slight offset) -->
  <rect x="34" y="24" width="58" height="78" rx="6" fill="#E0D4B4" stroke="#8B6914" stroke-width="2"/>

  <!-- Top card (face down with pattern) -->
  <rect x="38" y="20" width="58" height="78" rx="6" fill="#3E2A14" stroke="#8B6914" stroke-width="2.5"/>

  <!-- Card back decorative border -->
  <rect x="44" y="26" width="46" height="66" rx="3" fill="none" stroke="#C4A04A" stroke-width="1.5"/>

  <!-- Card back diamond pattern -->
  <polygon points="67,36 80,59 67,82 54,59" fill="none" stroke="#C4A04A" stroke-width="1.5"/>

  <!-- Center ornament -->
  <circle cx="67" cy="59" r="8" fill="none" stroke="#C4A04A" stroke-width="1.5"/>
  <circle cx="67" cy="59" r="3" fill="#C4A04A"/>

  <!-- Corner dots -->
  <circle cx="50" cy="32" r="2" fill="#C4A04A"/>
  <circle cx="84" cy="32" r="2" fill="#C4A04A"/>
  <circle cx="50" cy="86" r="2" fill="#C4A04A"/>
  <circle cx="84" cy="86" r="2" fill="#C4A04A"/>
</svg>