<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Build Card: workers constructing a wall/building, one directing, others laying bricks and carrying wood -->

  <g fill="#1A1A1A">
    <!-- Ground -->
    <ellipse cx="256" cy="468" rx="230" ry="28"/>
    <path d="M50,462 Q150,450 250,464 Q350,478 450,458" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

    <!-- === WALL UNDER CONSTRUCTION (center-right) === -->
    <!-- Bottom row of bricks -->
    <rect x="260" y="340" width="180" height="30" rx="2"/>
    <line x1="300" y1="340" x2="300" y2="370" stroke="white" stroke-width="1.5"/>
    <line x1="340" y1="340" x2="340" y2="370" stroke="white" stroke-width="1.5"/>
    <line x1="380" y1="340" x2="380" y2="370" stroke="white" stroke-width="1.5"/>
    <line x1="420" y1="340" x2="420" y2="370" stroke="white" stroke-width="1.5"/>
    <!-- Second row -->
    <rect x="260" y="308" width="180" height="30" rx="2"/>
    <line x1="280" y1="308" x2="280" y2="338" stroke="white" stroke-width="1.5"/>
    <line x1="320" y1="308" x2="320" y2="338" stroke="white" stroke-width="1.5"/>
    <line x1="360" y1="308" x2="360" y2="338" stroke="white" stroke-width="1.5"/>
    <line x1="400" y1="308" x2="400" y2="338" stroke="white" stroke-width="1.5"/>
    <!-- Third row -->
    <rect x="260" y="276" width="160" height="30" rx="2"/>
    <line x1="300" y1="276" x2="300" y2="306" stroke="white" stroke-width="1.5"/>
    <line x1="340" y1="276" x2="340" y2="306" stroke="white" stroke-width="1.5"/>
    <line x1="380" y1="276" x2="380" y2="306" stroke="white" stroke-width="1.5"/>
    <!-- Fourth row (partial, being built) -->
    <rect x="260" y="248" width="100" height="26" rx="2"/>
    <line x1="300" y1="248" x2="300" y2="274" stroke="white" stroke-width="1.5"/>
    <line x1="340" y1="248" x2="340" y2="274" stroke="white" stroke-width="1.5"/>

    <!-- Brick being placed (floating, in transit) -->
    <rect x="370" y="238" width="38" height="22" rx="2"/>
    <line x1="388" y1="238" x2="388" y2="260" stroke="white" stroke-width="1"/>

    <!-- === WORKER ON SCAFFOLD placing brick === -->
    <!-- Head -->
    <circle cx="380" cy="186" r="22"/>
    <!-- Headband -->
    <path d="M360,180 Q380,172 400,180" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Face -->
    <ellipse cx="390" cy="184" rx="2.5" ry="3" fill="white"/>
    <!-- Hair -->
    <path d="M360,176 Q358,164 366,158 Q378,152 392,156 Q402,162 402,176 Q394,168 380,166 Q368,168 360,176 Z"/>
    <path d="M368,162 Q380,156 394,160" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

    <!-- Torso -->
    <path d="M364,206 Q380,200 396,206 L402,270 Q384,278 368,270 Z"/>
    <path d="M370,224 Q382,218 394,224" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>
    <path d="M368,246 Q382,240 398,246" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>

    <!-- Arms reaching forward with brick -->
    <path d="M396,214 Q412,210 424,218 Q436,228 440,244 L432,248 Q430,234 420,224 Q410,216 398,220 Z"/>
    <path d="M364,214 Q348,218 340,228 L344,234 Q350,224 362,220 Z"/>
    <!-- Hand on brick -->
    <ellipse cx="406" cy="248" rx="10" ry="8"/>

    <!-- Legs on scaffold -->
    <path d="M370,268 L366,320 L376,322 L378,274"/>
    <path d="M390,268 L392,320 L382,322 L382,274"/>

    <!-- Scaffold structure -->
    <rect x="340" y="322" width="80" height="6" rx="1"/>
    <!-- Scaffold legs -->
    <rect x="344" y="326" width="6" height="130" rx="1"/>
    <rect x="410" y="326" width="6" height="130" rx="1"/>
    <!-- Scaffold cross brace -->
    <line x1="347" y1="340" x2="413" y2="440" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <line x1="413" y1="340" x2="347" y2="440" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Scaffold horizontal brace -->
    <rect x="348" y="390" width="64" height="4" rx="1"/>
    <line x1="350" y1="392" x2="410" y2="392" stroke="white" stroke-width="1"/>

    <!-- === WOOD PLANKS on ground === -->
    <g transform="translate(60,400)">
      <rect x="0" y="0" width="140" height="16" rx="2" transform="rotate(-5 70 8)"/>
      <line x1="10" y1="6" x2="130" y2="2" stroke="white" stroke-width="1" opacity="0.4" transform="rotate(-5 70 8)"/>
      <line x1="10" y1="12" x2="130" y2="8" stroke="white" stroke-width="0.8" opacity="0.3" transform="rotate(-5 70 8)"/>
      <!-- Knot -->
      <circle cx="50" cy="6" r="3" fill="white" opacity="0.2" transform="rotate(-5 70 8)"/>

      <rect x="10" y="18" width="130" height="16" rx="2" transform="rotate(2 75 26)"/>
      <line x1="20" y1="24" x2="130" y2="26" stroke="white" stroke-width="1" opacity="0.4" transform="rotate(2 75 26)"/>
      <line x1="20" y1="30" x2="130" y2="32" stroke="white" stroke-width="0.8" opacity="0.3" transform="rotate(2 75 26)"/>

      <rect x="16" y="36" width="120" height="16" rx="2" transform="rotate(-3 76 44)"/>
      <line x1="26" y1="42" x2="126" y2="40" stroke="white" stroke-width="1" opacity="0.4" transform="rotate(-3 76 44)"/>
    </g>

    <!-- === MAIN FIGURE: foreman/architect directing === -->
    <!-- Head -->
    <circle cx="170" cy="140" r="28"/>
    <!-- Hair -->
    <path d="M144,128 Q146,110 160,102 Q174,96 188,102 Q200,110 200,128 Q192,118 178,114 Q162,114 150,122 Z"/>
    <path d="M156,108 Q170,100 186,106" fill="none" stroke="white" stroke-width="1.2" opacity="0.3"/>
    <!-- Face -->
    <ellipse cx="182" cy="138" rx="3" ry="4" fill="white"/>
    <path d="M176,150 Q182,156 190,152" fill="none" stroke="white" stroke-width="1.5"/>

    <!-- Torso -->
    <path d="M150,166 Q170,158 194,166 L200,278 Q176,288 156,280 Z"/>
    <!-- Vest/apron -->
    <path d="M156,180 Q170,172 192,180 L190,220 Q172,228 158,220 Z" fill="white" opacity="0.12"/>
    <path d="M160,186 Q172,180 190,186" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M158,206 Q172,200 188,206" fill="none" stroke="white" stroke-width="1.2"/>
    <!-- Belt with tools -->
    <path d="M152,258 Q172,250 198,258 L196,268 Q172,260 154,268 Z"/>
    <rect x="168" y="254" width="12" height="16" rx="2" fill="white"/>
    <!-- Hammer hanging from belt -->
    <rect x="186" y="266" width="4" height="20" rx="1"/>
    <rect x="182" y="284" width="12" height="8" rx="2"/>
    <line x1="184" y1="288" x2="192" y2="288" stroke="white" stroke-width="1.2"/>

    <!-- Right arm pointing at wall -->
    <path d="M192,174 Q216,170 236,172 Q256,176 268,184 L266,194 Q254,186 236,182 Q218,180 196,182 Z"/>
    <!-- Hand pointing -->
    <path d="M268,184 L290,178 Q288,184 270,192 L266,194 Z"/>

    <!-- Left arm holding scroll/blueprint -->
    <path d="M152,174 Q136,180 124,192 Q114,204 110,220 L118,224 Q120,208 128,196 Q138,184 154,180 Z"/>
    <!-- Hand -->
    <ellipse cx="112" cy="226" rx="10" ry="8"/>
    <!-- Blueprint scroll -->
    <rect x="96" y="218" width="8" height="50" rx="3"/>
    <rect x="110" y="218" width="8" height="50" rx="3"/>
    <rect x="100" y="224" width="22" height="38" rx="1" fill="white" opacity="0.15"/>
    <!-- Blueprint lines -->
    <line x1="104" y1="232" x2="118" y2="232" stroke="white" stroke-width="1"/>
    <line x1="104" y1="240" x2="116" y2="240" stroke="white" stroke-width="1"/>
    <line x1="104" y1="248" x2="114" y2="248" stroke="white" stroke-width="1"/>
    <rect x="106" y="252" width="8" height="6" rx="1" fill="white" opacity="0.2"/>

    <!-- Legs -->
    <path d="M160,276 Q150,316 142,356 Q136,390 132,420 Q130,440 138,448 L160,452 Q156,440 158,422 Q162,394 168,360 Q176,324 180,284 Z"/>
    <!-- Boot -->
    <path d="M132,444 Q128,450 132,456 L164,456 Q166,450 160,448"/>
    <line x1="136" y1="452" x2="162" y2="452" stroke="white" stroke-width="1.5"/>

    <path d="M188,276 Q196,318 206,358 Q214,392 220,424 L240,446 Q236,430 230,412 Q222,384 214,352 Q204,316 198,280 Z"/>
    <!-- Boot -->
    <path d="M220,424 Q224,436 234,444 L240,446 Q238,440 234,432 L226,426 Z"/>
    <line x1="226" y1="438" x2="236" y2="442" stroke="white" stroke-width="1.2"/>

    <!-- === BACKGROUND WORKER: carrying plank on shoulder === -->
    <g opacity="0.85">
      <circle cx="60" cy="280" r="16"/>
      <!-- Headband -->
      <path d="M46,274 Q60,268 74,274" fill="none" stroke="white" stroke-width="2"/>
      <!-- Body -->
      <path d="M48,294 Q60,288 72,294 L76,366 Q62,374 50,366 Z"/>
      <path d="M54,312 Q62,308 70,312" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
      <!-- Plank on shoulder -->
      <rect x="20" y="272" width="120" height="10" rx="2" transform="rotate(-8 80 277)"/>
      <line x1="28" y1="276" x2="132" y2="268" stroke="white" stroke-width="1" opacity="0.4"/>
      <!-- Arm holding plank -->
      <path d="M70,298 Q78,290 84,282 L80,278 Q74,286 68,294 Z"/>
      <!-- Legs walking -->
      <path d="M52,364 L44,432 L54,436 L60,368"/>
      <path d="M68,364 L74,432 L64,436 L62,368"/>
    </g>

    <!-- Sawdust / debris particles -->
    <circle cx="250" cy="380" r="2.5"/>
    <circle cx="240" cy="392" r="2"/>
    <circle cx="258" cy="396" r="1.5"/>
    <circle cx="232" cy="386" r="2"/>

    <!-- Grass tufts -->
    <g stroke="#1A1A1A" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M470,456 Q466,438 462,430"/>
      <path d="M470,456 Q474,436 480,430"/>
    </g>
  </g>
</svg>
