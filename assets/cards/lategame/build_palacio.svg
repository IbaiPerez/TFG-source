<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <g fill="#1A1A1A">
    <ellipse cx="256" cy="468" rx="230" ry="28"/>
    <!-- Grand base -->
    <rect x="60" y="420" width="392" height="24" rx="2" stroke="white" stroke-width="2" fill="none"/>
    <rect x="76" y="396" width="360" height="28" rx="2" stroke="white" stroke-width="2" fill="none"/>
    <!-- Main palace body -->
    <rect x="100" y="210" width="312" height="190" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Central dome -->
    <ellipse cx="256" cy="210" rx="80" ry="50" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Crown spire -->
    <rect x="240" y="140" width="32" height="24" stroke="white" stroke-width="2" fill="none"/>
    <polygon points="256,100 236,140 276,140" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="256" cy="96" r="8" stroke="white" stroke-width="2" fill="none"/>
    <!-- Left tower -->
    <rect x="60" y="150" width="56" height="248" stroke="white" stroke-width="2.5" fill="none"/>
    <polygon points="88,100 54,150 122,150" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="88" cy="96" r="8" stroke="white" stroke-width="2" fill="none"/>
    <!-- Right tower -->
    <rect x="396" y="150" width="56" height="248" stroke="white" stroke-width="2.5" fill="none"/>
    <polygon points="424,100 390,150 458,150" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="424" cy="96" r="8" stroke="white" stroke-width="2" fill="none"/>
    <!-- Grand entrance -->
    <rect x="216" y="290" width="80" height="108" rx="40" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Windows -->
    <rect x="124" y="250" width="34" height="50" rx="17" stroke="white" stroke-width="1.5" fill="none"/>
    <rect x="354" y="250" width="34" height="50" rx="17" stroke="white" stroke-width="1.5" fill="none"/>
    <!-- Tower windows -->
    <rect x="74" y="190" width="26" height="36" rx="13" stroke="white" stroke-width="1.5" fill="none"/>
    <rect x="410" y="190" width="26" height="36" rx="13" stroke="white" stroke-width="1.5" fill="none"/>
    <!-- Imperial star -->
    <polygon points="256,218 260,228 270,228 262,234 265,244 256,238 247,244 250,234 242,228 252,228" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
</svg>
