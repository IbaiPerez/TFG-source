<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <g fill="#1A1A1A">
    <ellipse cx="256" cy="468" rx="230" ry="28"/>
    <!-- Main building -->
    <rect x="140" y="240" width="232" height="200" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Central tower -->
    <rect x="210" y="100" width="92" height="144" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Spire -->
    <polygon points="256,30 210,100 302,100" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Cross -->
    <line x1="256" y1="10" x2="256" y2="34" stroke="white" stroke-width="3"/>
    <line x1="246" y1="22" x2="266" y2="22" stroke="white" stroke-width="3"/>
    <!-- Side towers -->
    <rect x="110" y="170" width="44" height="72" stroke="white" stroke-width="2" fill="none"/>
    <polygon points="132,130 106,170 158,170" fill="none" stroke="white" stroke-width="2"/>
    <rect x="358" y="170" width="44" height="72" stroke="white" stroke-width="2" fill="none"/>
    <polygon points="380,130 354,170 406,170" fill="none" stroke="white" stroke-width="2"/>
    <!-- Rose window -->
    <circle cx="256" cy="160" r="28" stroke="white" stroke-width="2.5" fill="none"/>
    <circle cx="256" cy="160" r="16" stroke="white" stroke-width="1.5" fill="none"/>
    <line x1="256" y1="132" x2="256" y2="188" stroke="white" stroke-width="1"/>
    <line x1="228" y1="160" x2="284" y2="160" stroke="white" stroke-width="1"/>
    <!-- Arched door -->
    <rect x="220" y="330" width="72" height="110" rx="36" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Side windows -->
    <rect x="158" y="280" width="30" height="50" rx="15" stroke="white" stroke-width="1.5" fill="none"/>
    <rect x="324" y="280" width="30" height="50" rx="15" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
</svg>
