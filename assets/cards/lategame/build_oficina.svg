<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <g fill="#1A1A1A">
    <ellipse cx="256" cy="468" rx="230" ry="28"/>
    <!-- Main building -->
    <rect x="130" y="210" width="252" height="230" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Roof -->
    <polygon points="120,210 256,110 392,210" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Door -->
    <rect x="222" y="330" width="68" height="110" rx="4" stroke="white" stroke-width="2" fill="none"/>
    <circle cx="280" cy="385" r="4" stroke="white" stroke-width="1.5" fill="none"/>
    <!-- Windows -->
    <rect x="152" y="240" width="44" height="44" rx="2" stroke="white" stroke-width="2" fill="none"/>
    <line x1="174" y1="240" x2="174" y2="284" stroke="white" stroke-width="1.5"/>
    <line x1="152" y1="262" x2="196" y2="262" stroke="white" stroke-width="1.5"/>
    <rect x="316" y="240" width="44" height="44" rx="2" stroke="white" stroke-width="2" fill="none"/>
    <line x1="338" y1="240" x2="338" y2="284" stroke="white" stroke-width="1.5"/>
    <line x1="316" y1="262" x2="360" y2="262" stroke="white" stroke-width="1.5"/>
    <!-- Gear symbol on roof -->
    <circle cx="256" cy="164" r="24" stroke="white" stroke-width="2.5" fill="none"/>
    <circle cx="256" cy="164" r="10" stroke="white" stroke-width="2" fill="none"/>
    <line x1="256" y1="136" x2="256" y2="144" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="256" y1="184" x2="256" y2="192" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="232" y1="164" x2="240" y2="164" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="272" y1="164" x2="280" y2="164" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Blueprint rolls by door -->
    <rect x="152" y="390" width="40" height="12" rx="6" stroke="white" stroke-width="1.5" fill="none"/>
    <rect x="320" y="390" width="40" height="12" rx="6" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
</svg>
