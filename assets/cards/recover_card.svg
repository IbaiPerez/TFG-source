<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Recover Card: figure reaching into a chest/pile to pull out a glowing card/scroll -->

  <g fill="#1A1A1A">
    <!-- Ground -->
    <ellipse cx="256" cy="468" rx="230" ry="28"/>
    <path d="M50,462 Q150,450 250,464 Q350,478 450,458" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>

    <!-- === CHEST (center-bottom) === -->
    <!-- Chest body -->
    <rect x="180" y="320" width="180" height="110" rx="8"/>
    <!-- Chest lid (open, angled back) -->
    <path d="M176,320 L176,280 Q180,268 200,264 L360,264 Q380,268 384,280 L384,320 Z"/>
    <!-- Lid inner edge -->
    <path d="M184,316 L184,284 Q188,274 204,270 L356,270 Q372,274 376,284 L376,316" fill="none" stroke="white" stroke-width="1.5" opacity="0.15"/>
    <!-- Chest lid top curve -->
    <path d="M176,280 Q270,260 384,280" fill="none" stroke="white" stroke-width="2" opacity="0.2"/>
    <!-- Chest bands/iron straps -->
    <rect x="174" y="346" width="186" height="8" rx="1"/>
    <line x1="180" y1="350" x2="354" y2="350" stroke="white" stroke-width="1.5"/>
    <rect x="174" y="392" width="186" height="8" rx="1"/>
    <line x1="180" y1="396" x2="354" y2="396" stroke="white" stroke-width="1.5"/>
    <!-- Chest lock -->
    <circle cx="270" cy="370" r="10"/>
    <circle cx="270" cy="370" r="5" fill="white" opacity="0.15"/>
    <!-- Chest side rivets -->
    <circle cx="192" cy="340" r="3"/>
    <circle cx="350" cy="340" r="3"/>
    <circle cx="192" cy="410" r="3"/>
    <circle cx="350" cy="410" r="3"/>

    <!-- Cards inside chest (visible, scattered) -->
    <g opacity="0.6">
      <rect x="200" y="328" width="32" height="46" rx="3" transform="rotate(-12 216 351)"/>
      <line x1="206" y1="338" x2="224" y2="334" stroke="white" stroke-width="1" opacity="0.4"/>
      <rect x="240" y="330" width="32" height="46" rx="3" transform="rotate(6 256 353)"/>
      <line x1="246" y1="340" x2="264" y2="342" stroke="white" stroke-width="1" opacity="0.4"/>
      <rect x="290" y="326" width="32" height="46" rx="3" transform="rotate(-4 306 349)"/>
      <line x1="296" y1="336" x2="314" y2="334" stroke="white" stroke-width="1" opacity="0.4"/>
      <rect x="324" y="332" width="30" height="44" rx="3" transform="rotate(10 339 354)"/>
    </g>

    <!-- === CARD BEING PULLED OUT (glowing, rising from chest) === -->
    <!-- Glow aura behind card -->
    <ellipse cx="270" cy="220" rx="40" ry="60" fill="white" opacity="0.06"/>
    <ellipse cx="270" cy="220" rx="28" ry="45" fill="white" opacity="0.08"/>
    <!-- The recovered card -->
    <rect x="248" y="168" width="44" height="64" rx="5"/>
    <!-- Card face content -->
    <rect x="254" y="176" width="32" height="8" rx="2" fill="white" opacity="0.4"/>
    <rect x="254" y="188" width="24" height="5" rx="2" fill="white" opacity="0.3"/>
    <!-- Card icon area -->
    <rect x="256" y="198" width="28" height="22" rx="2" fill="white" opacity="0.12"/>
    <!-- Star on card -->
    <polygon points="270,202 273,210 280,210 274,215 276,222 270,218 264,222 266,215 260,210 267,210" fill="white" opacity="0.3"/>
    <!-- Sparkle particles around card -->
    <circle cx="240" cy="186" r="2.5" fill="white" opacity="0.25"/>
    <circle cx="302" cy="194" r="2" fill="white" opacity="0.2"/>
    <circle cx="236" cy="210" r="1.5" fill="white" opacity="0.15"/>
    <circle cx="308" cy="178" r="2" fill="white" opacity="0.2"/>
    <circle cx="252" cy="166" r="1.5" fill="white" opacity="0.15"/>
    <circle cx="292" cy="164" r="2" fill="white" opacity="0.18"/>

    <!-- === MAIN FIGURE: scholar/mage recovering the card === -->
    <!-- Head -->
    <circle cx="140" cy="134" r="28"/>
    <!-- Hood/cloak hood -->
    <path d="M114,124 Q112,100 124,88 Q140,78 156,84 Q168,92 170,112 Q170,124 168,134 Q158,116 140,110 Q122,112 114,124 Z"/>
    <path d="M124,94 Q140,84 158,92" fill="none" stroke="white" stroke-width="1.2" opacity="0.3"/>
    <!-- Face -->
    <ellipse cx="150" cy="132" rx="2.5" ry="3.5" fill="white"/>
    <path d="M144,144 Q150,150 158,146" fill="none" stroke="white" stroke-width="1.5"/>

    <!-- Torso - long robe -->
    <path d="M118,160 Q140,152 164,160 L172,310 Q148,320 124,310 Z"/>
    <!-- Robe folds -->
    <path d="M124,184 Q142,176 162,184" fill="none" stroke="white" stroke-width="1.5" opacity="0.35"/>
    <path d="M122,216 Q142,208 166,216" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <path d="M120,250 Q142,242 168,250" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>
    <!-- Collar -->
    <path d="M120,164 Q140,176 164,164" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Sash -->
    <line x1="142" y1="270" x2="142" y2="310" stroke="white" stroke-width="2" opacity="0.3"/>

    <!-- Right arm reaching towards card in chest -->
    <path d="M162,174 Q188,168 212,172 Q234,180 248,192 L244,204 Q232,194 214,184 Q194,178 166,182 Z"/>
    <!-- Sleeve flow -->
    <path d="M190,176 Q216,172 238,188" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <!-- Hand gripping card -->
    <ellipse cx="250" cy="204" rx="12" ry="9"/>
    <path d="M240,200 Q248,194 258,198" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M238,208 Q248,214 260,210" fill="none" stroke="white" stroke-width="1.5"/>

    <!-- Left arm extended with magic glow -->
    <path d="M118,174 Q100,184 88,198 Q78,214 74,234 L82,238 Q84,218 92,204 Q102,190 120,180 Z"/>
    <!-- Hand -->
    <ellipse cx="76" cy="240" rx="10" ry="8"/>
    <!-- Magic wisps from left hand -->
    <path d="M76,232 Q68,218 72,204 Q78,192 88,186" fill="none" stroke="white" stroke-width="1.5" opacity="0.2"/>
    <path d="M80,230 Q74,220 80,210" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>

    <!-- Legs -->
    <path d="M128,308 Q120,348 114,388 Q110,418 108,440 Q106,452 114,458 L136,460 Q132,448 134,430 Q138,400 144,366 Q152,330 156,312 Z"/>
    <path d="M162,308 Q168,348 176,388 Q182,418 188,440 L208,454 Q204,438 198,420 Q190,390 182,358 Q172,324 166,308 Z"/>
    <!-- Boot -->
    <path d="M108,454 Q104,460 108,466 L140,466 Q142,460 136,458"/>
    <line x1="112" y1="462" x2="138" y2="462" stroke="white" stroke-width="1.5"/>

    <!-- === BACKGROUND: magical circle on ground near chest === -->
    <ellipse cx="270" cy="442" rx="90" ry="16" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
    <ellipse cx="270" cy="442" rx="70" ry="12" fill="none" stroke="white" stroke-width="0.8" opacity="0.08"/>

    <!-- Atmosphere particles -->
    <circle cx="200" cy="200" r="2" opacity="0.35"/>
    <circle cx="320" cy="250" r="1.5" opacity="0.3"/>
    <circle cx="160" cy="280" r="2" opacity="0.25"/>
    <circle cx="340" cy="300" r="1.5" opacity="0.2"/>
  </g>
</svg>
