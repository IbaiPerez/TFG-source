<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#E8E0D0" stroke="#5C4033" stroke-width="3"/>

  <!-- Helmet 1 (back) -->
  <g transform="translate(40 60)">
    <path d="M0 14 Q0 -10 22 -10 Q44 -10 44 14 L44 22 L0 22 Z" fill="#8B7355" stroke="#3E2A18" stroke-width="2"/>
    <rect x="0" y="22" width="44" height="6" fill="#5C4033" stroke="#3E2A18" stroke-width="2"/>
    <rect x="20" y="-18" width="4" height="12" fill="#5C4033"/>
    <path d="M16 -18 Q22 -28 28 -18 L24 -6 L20 -6 Z" fill="#A02020" stroke="#3E2A18" stroke-width="1.5"/>
  </g>

  <!-- Helmet 2 (front, smaller, offset) -->
  <g transform="translate(20 78)">
    <path d="M0 10 Q0 -6 16 -6 Q32 -6 32 10 L32 16 L0 16 Z" fill="#A0896C" stroke="#3E2A18" stroke-width="2"/>
    <rect x="0" y="16" width="32" height="4" fill="#5C4033" stroke="#3E2A18" stroke-width="1.5"/>
  </g>

  <!-- Helmet 3 (front-right, smaller) -->
  <g transform="translate(76 78)">
    <path d="M0 10 Q0 -6 16 -6 Q32 -6 32 10 L32 16 L0 16 Z" fill="#A0896C" stroke="#3E2A18" stroke-width="2"/>
    <rect x="0" y="16" width="32" height="4" fill="#5C4033" stroke="#3E2A18" stroke-width="1.5"/>
  </g>

  <!-- Wooden shelf the helmets rest on -->
  <rect x="10" y="97" width="108" height="7" rx="2" fill="#8B6914" stroke="#6B4C0A" stroke-width="1.5"/>
  <rect x="12" y="99" width="104" height="2" rx="1" fill="#DAA520" opacity="0.35"/>

  <!-- Shadow under each helmet -->
  <ellipse cx="62" cy="99" rx="24" ry="3.5" fill="#2A1A0A" opacity="0.22"/>
  <ellipse cx="36" cy="99" rx="16" ry="2.5" fill="#2A1A0A" opacity="0.18"/>
  <ellipse cx="92" cy="99" rx="16" ry="2.5" fill="#2A1A0A" opacity="0.18"/>
</svg>
