<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <circle cx="64" cy="64" r="60" fill="#8B1A1A" opacity="0.9"/>
  <!-- Espada izquierda (inclinada a la derecha) -->
  <g transform="translate(64,64) rotate(-30)">
    <!-- Hoja -->
    <rect x="-3" y="-40" width="6" height="50" rx="1" fill="#D4D4D4"/>
    <!-- Punta -->
    <polygon points="-3,-40 3,-40 0,-48" fill="#E8E8E8"/>
    <!-- Guarda -->
    <rect x="-10" y="10" width="20" height="4" rx="1" fill="#FFD700"/>
    <!-- Mango -->
    <rect x="-2.5" y="14" width="5" height="16" rx="1" fill="#8B4513"/>
    <!-- Pomo -->
    <circle cx="0" cy="32" r="3.5" fill="#FFD700"/>
  </g>
  <!-- Espada derecha (inclinada a la izquierda) -->
  <g transform="translate(64,64) rotate(30)">
    <!-- Hoja -->
    <rect x="-3" y="-40" width="6" height="50" rx="1" fill="#D4D4D4"/>
    <!-- Punta -->
    <polygon points="-3,-40 3,-40 0,-48" fill="#E8E8E8"/>
    <!-- Guarda -->
    <rect x="-10" y="10" width="20" height="4" rx="1" fill="#FFD700"/>
    <!-- Mango -->
    <rect x="-2.5" y="14" width="5" height="16" rx="1" fill="#8B4513"/>
    <!-- Pomo -->
    <circle cx="0" cy="32" r="3.5" fill="#FFD700"/>
  </g>
</svg>
